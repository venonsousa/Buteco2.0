<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio PRO</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  font-family: Arial;
}

/* PLAYER */
.player {
  width: 720px;
  height: 360px;
  display: flex;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  color: #fff;
}

/* CAPA */
.capa {
  width: 230px;
  height: 230px;
  margin: 20px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  animation: girar 10s linear infinite;
  animation-play-state: paused;
}

.playing .capa {
  animation-play-state: running;
}

@keyframes girar {
  to { transform: rotate(360deg); }
}

/* TEXTO */
.content { padding: 20px; }

.artista { font-size: 18px; opacity: 0.7; }

.musica {
  font-size: 28px;
  font-weight: bold;
  margin-top: 10px;
}

.album {
  font-size: 14px;
  opacity: 0.6;
  margin-top: 5px;
}

/* BOTÃO */
.btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: #1db954;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-top: 20px;
}

.icon {
  width: 0;
  height: 0;
  border-left: 18px solid #fff;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
}

.playing .icon {
  width: 16px;
  height: 20px;
  border: none;
  position: relative;
}

.playing .icon::before,
.playing .icon::after {
  content: "";
  position: absolute;
  width: 5px;
  height: 100%;
  background: #fff;
}

.playing .icon::before { left: 0; }
.playing .icon::after { right: 0; }

</style>
</head>

<body>

<div class="player" id="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div class="artista" id="artista">Carregando...</div>
    <div class="musica" id="musica">Carregando música...</div>
    <div class="album" id="album"></div>

    <div class="btn" onclick="togglePlay()" id="btn">
      <div class="icon"></div>
    </div>
  </div>

</div>

<audio id="audio" src="https://stm.igng.com.br:7018/stream"></audio>

<script>

let audio = document.getElementById("audio");
let player = document.getElementById("player");

let ultimaBusca = "";

/* PLAY */
function togglePlay() {
  audio.paused ? audio.play() : audio.pause();
}

audio.onplay = () => player.classList.add("playing");
audio.onpause = () => player.classList.remove("playing");

/* SEPARAR */
function separar(texto) {
  if (!texto) return { artista: "AO VIVO", musica: "Transmissão" };

  let partes = texto.split(" - ");

  if (partes.length >= 2) {
    return {
      artista: partes[0].trim(),
      musica: partes.slice(1).join(" - ").trim()
    };
  }

  return { artista: "AO VIVO", musica: texto };
}

/* BUSCAR CAPA NA APPLE (iTunes API) */
function buscarCapa(artista, musica) {

  let query = encodeURIComponent(artista + " " + musica);

  fetch(`https://itunes.apple.com/search?term=${query}&entity=song&limit=1`)
    .then(r => r.json())
    .then(data => {

      if (data.results && data.results.length > 0) {

        let item = data.results[0];

        let capa = item.artworkUrl100.replace("100x100", "500x500");

        document.getElementById("capa").style.backgroundImage = `url(${capa})`;
        document.getElementById("album").innerText = "💿 " + item.collectionName;

      }
    })
    .catch(()=>{});
}

/* API RÁDIO */
const API = "https://api.codetabs.com/v1/proxy?quest=https://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=";

function carregar() {
  fetch(API)
    .then(r => r.json())
    .then(data => {

      let texto = data.musica_atual;

      let info = separar(texto);

      document.getElementById("artista").innerText = info.artista;
      document.getElementById("musica").innerText = info.musica;

      let chave = info.artista + info.musica;

      if (chave !== ultimaBusca) {
        ultimaBusca = chave;
        buscarCapa(info.artista, info.musica);
      }

    })
    .catch(()=>{});
}

/* LOOP */
setInterval(carregar, 4000);
carregar();

</script>

</body>
</html>
