<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio ULTRA MASTER</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial;
  background: #000;
  overflow: hidden;
}

/* FUNDO */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  filter: blur(40px) brightness(0.4);
  transform: scale(1.2);
  background-size: cover;
  z-index: -1;
}

/* PLAYER */
.player {
  width: 767px;
  height: 410px;
  display: flex;
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  color: #fff;
}

.player::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: var(--bg-player, url('https://picsum.photos/800/500')) center/cover no-repeat;
  filter: blur(15px) brightness(0.4);
  transform: scale(1.2);
}

.player::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.player > * {
  position: relative;
  z-index: 2;
}

/* CAPA */
.capa {
  width: 198px;
  height: 216px;
  margin: 20px;
  border-radius: 12px;
  background-size: cover;
}

/* CONTENT */
.content {
  padding: 20px;
  flex: 1;
}

.artista { font-size: 18px; opacity: 0.8; margin-top: 10px; }

.musica {
  font-size: 26px;
  font-weight: bold;
  width: 486px;
  overflow: hidden;
}

.musica span {
  white-space: nowrap;
  display: inline-block;
}

/* ALBUM */
.album {
  margin-top: 5px;
  font-size: 14px;
  opacity: 0.7;
}

/* BOTÕES */
.btn-circle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-top: 15px;
}

.btn-social {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* REDES */
.redes {
  display: flex;
  gap: 8px;
  margin-top: 15px;
}

/* PLAY ICON */
.icon {
  width: 0;
  height: 0;
  border-left: 14px solid #fff;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
}

.playing .icon {
  width: 14px;
  height: 18px;
  border: none;
  position: relative;
}

.playing .icon::before,
.playing .icon::after {
  content: "";
  position: absolute;
  width: 4px;
  height: 100%;
  background: #fff;
}

.playing .icon::before { left: 0; }
.playing .icon::after { right: 0; }

/* PARTÍCULAS */
.particle {
  position: fixed;
  width: 5px;
  height: 5px;
  background: #fff;
  border-radius: 50%;
  animation: subir 1s forwards;
}

@keyframes subir {
  to { transform: translateY(-50px); opacity: 0; }
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="player" id="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div class="artista" id="artista">---</div>

    <div class="musica">
      <span id="musicaTexto">---</span>
    </div>

    <div class="album" id="album">---</div>

    <!-- PLAY -->
    <div class="btn-circle" onclick="togglePlay()" id="btn">
      <div class="icon"></div>
    </div>

    <!-- REDES -->
    <div class="redes">
      <div class="btn-social" onclick="abrir('https://facebook.com')">f</div>
      <div class="btn-social" onclick="abrir('https://x.com')">X</div>
      <div class="btn-social" onclick="abrir('https://t.me')">T</div>
      <div class="btn-social" onclick="abrir('https://instagram.com')">I</div>
    </div>

  </div>

</div>

<audio id="audio" src="https://stm.igng.com.br:7018/stream"></audio>

<script>

/* ELEMENTOS */
let audio = document.getElementById("audio");
let btn = document.getElementById("btn");

/* PLAY */
audio.onplay = () => btn.classList.add("playing");
audio.onpause = () => btn.classList.remove("playing");

function togglePlay() {
  audio.paused ? audio.play() : audio.pause();
}

function abrir(url){
  window.open(url, "_blank");
}

/* APIs */
const API_JSON = "https://api.codetabs.com/v1/proxy?quest=https://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=";
const API_XML_EXTRA = "https://api.codetabs.com/v1/proxy?quest=http://igng.com.br/api/TnpBeE9BPT0rWg==";

/* TEXTO ROLANDO */
function atualizarTextoMusica(texto) {
  const el = document.getElementById("musicaTexto");
  el.innerText = texto;
}

/* API PRINCIPAL */
function carregarPrincipal() {
  fetch(API_JSON)
    .then(r => r.json())
    .then(data => {

      if (data.capa_musica) {
        document.getElementById("capa").style.backgroundImage = `url(${data.capa_musica})`;
        document.getElementById("bg").style.backgroundImage = `url(${data.capa_musica})`;
        document.getElementById("player").style.setProperty("--bg-player", `url(${data.capa_musica})`);
      }

    });
}

/* API EXTRA (ARTISTA / MUSICA / ALBUM) */
function carregarExtra() {
  fetch(API_XML_EXTRA)
    .then(r => r.text())
    .then(str => {
      let xml = new DOMParser().parseFromString(str, "text/xml");

      let artista = xml.getElementsByTagName("artista")[0]?.textContent || "---";
      let musica  = xml.getElementsByTagName("musica")[0]?.textContent || "---";
      let album   = xml.getElementsByTagName("album")[0]?.textContent || "---";

      document.getElementById("artista").innerText = artista;
      atualizarTextoMusica(musica);
      document.getElementById("album").innerText = "💿 " + album;
    });
}

/* LOOP */
setInterval(() => {
  carregarPrincipal();
  carregarExtra();
}, 3000);

carregarPrincipal();
carregarExtra();

/* PARTÍCULAS */
document.addEventListener("mousemove", e => {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = e.clientX + "px";
  p.style.top = e.clientY + "px";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1000);
});

</script>

</body>
</html>
