<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player da Rádio</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    .player {
      width: 733px;
      height: 459px;
      border: 2px solid #333;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: row; /* capa à esquerda, info à direita */
      background: url('https://xatimg.com/image/EMsDSWDlogLy.png') no-repeat center center;
      background-size: cover;
      color: #fff;
      font-family: Arial, sans-serif;
      position: relative;
    }
    .cover {
      flex: 1;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cover img {
      max-width: 90%;
      max-height: 90%;
      transition: transform 0.3s ease;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
    }
    .info {
      flex: 2;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
    }
    .play-btn {
      background: #ff4444;
      border: none;
      color: #fff;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      transition: background 0.3s, transform 0.2s;
    }
    .play-btn:hover {
      background: #ff7777;
      transform: scale(1.1);
    }
    .socials {
      display: flex;
      gap: 10px;
    }
    .socials a img {
      width: 24px;
      height: 24px;
      filter: invert(1);
      transition: transform 0.3s ease, filter 0.3s ease;
    }
    .socials a img:hover {
      transform: rotate(15deg) scale(1.2);
      filter: invert(0.5) sepia(1) hue-rotate(200deg);
    }
  </style>
</head>
<body>
  <div class="player" id="player">
    <div class="cover">
      <img id="capa" src="" alt="Capa da música">
    </div>
    <div class="info">
      <div>
        <h3 id="titulo">Carregando rádio...</h3>
        <p><strong>Artista:</strong> <span id="artista">--</span></p>
        <p><strong>Música:</strong> <span id="musica">--</span></p>
        <p><strong>Ouvintes:</strong> <span id="ouvintes">--</span></p>
        <p><strong>Bitrate:</strong> <span id="bitrate">--</span> kbps</p>
      </div>
      <div class="controls">
        <button id="playPause" class="play-btn">▶</button>
        <div class="socials">
          <a href="https://instagram.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg" alt="Instagram"></a>
          <a href="https://facebook.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg" alt="Facebook"></a>
          <a href="https://x.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/x.svg" alt="X"></a>
          <a href="https://t.me" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/telegram.svg" alt="Telegram"></a>
        </div>
      </div>
      <audio id="audio" autoplay>
        <source src="https://stm.igng.com.br:7018/stream" type="audio/mpeg">
        Seu navegador não suporta áudio HTML5.
      </audio>
    </div>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const playPauseBtn = document.getElementById("playPause");
    const capa = document.getElementById("capa");

    playPauseBtn.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
        playPauseBtn.textContent = "❚❚";
      } else {
        audio.pause();
        playPauseBtn.textContent = "▶";
      }
    });

    // Atualiza info da rádio e busca capa no Apple Music
    function atualizarInfo() {
      $.ajax({
        url: 'https://igng.com.br/api/NzAxOCsx',
        dataType: 'xml',
        success: async function(xml) {
          const titulo = $(xml).find('titulo').text();
          const musicaAtual = $(xml).find('musica_atual').text();
          const ouvintes = $(xml).find('ouvintes_conectados').text();
          const bitrate = $(xml).find('plano_bitrate').text();

          $("#titulo").text(titulo);

          const partes = musicaAtual.split(" - ");
          const artista = partes[0] || "--";
          const musica = partes[1] || "--";
          $("#artista").text(artista);
          $("#musica").text(musica);
          $("#ouvintes").text(ouvintes);
          $("#bitrate").text(bitrate);

          // Buscar capa oficial no iTunes API
          try {
            const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(musica + " " + artista)}&entity=song&limit=1`);
            const data = await response.json();
            if (data.results.length > 0) {
              const artwork = data.results[0].artworkUrl100.replace("100x100", "600x600");
              $("#capa").attr("src", artwork);
            }
          } catch (err) {
            console.error("Erro ao buscar capa Apple Music", err);
          }
        }
      });
    }

    atualizarInfo();
    setInterval(atualizarInfo, 5000);

    // Interação com mouse na capa (efeito 3D)
    capa.addEventListener("mousemove", (e) => {
      const rect = capa.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      capa.style.transform = `scale(1.05) rotateY(${(x/rect.width - 0.5)*20}deg) rotateX(${(y/rect.height - 0.5)*20}deg)`;
    });
    capa.addEventListener("mouseleave", () => {
      capa.style.transform = "scale(1)";
    });
  </script>
</body>
</html>
