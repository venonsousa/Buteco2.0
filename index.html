<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Player PRO</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f0f0f;
  font-family: Arial;
}

.player {
  width: 320px;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  color: #fff;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.capa {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  overflow: hidden;
  margin: auto;
  animation: girar 12s linear infinite;
}

.capa img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

@keyframes girar {
  from { transform: rotate(0); }
  to { transform: rotate(360deg); }
}

#artista {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 10px;
}

#musica {
  font-weight: bold;
  overflow: hidden;
  white-space: nowrap;
}

.marquee {
  display: inline-block;
  padding-left: 100%;
  animation: marquee 10s linear infinite;
}

@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 30px;
  border: none;
  background: #00ffcc;
  cursor: pointer;
  font-weight: bold;
}

.stats {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="player">

  <div class="capa">
    <img id="cover" src="https://via.placeholder.com/300">
  </div>

  <div id="artista">Artista</div>
  <div id="musica"><span class="marquee">Carregando...</span></div>

  <button onclick="togglePlay()" id="btn">▶️ Play</button>

  <div class="stats">
    <div>Status: <span id="status">--</span></div>
    <div>Ouvintes: <span id="ouvintes">0</span></div>
  </div>

</div>

<audio id="audio" src="https://stm.igng.com.br:7018/stream"></audio>

<script>
let audio = document.getElementById("audio");
let btn = document.getElementById("btn");

function togglePlay() {
  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸️ Pause";
  } else {
    audio.pause();
    btn.innerText = "▶️ Play";
  }
}

// 🔥 API DA RÁDIO
async function atualizarPlayer() {
  try {
    const res = await fetch("https://api.allorigins.win/raw?url=http://igng.com.br/api-json/TnpBeE9BPT0rWg==");
    const data = await res.json();

    let musicaCompleta = data.musica || "Desconhecido";

    let partes = musicaCompleta.split(" - ");
    let artista = partes[0] || "Desconhecido";
    let musica = partes[1] || musicaCompleta;

    document.getElementById("artista").innerText = artista;
    document.getElementById("musica").innerHTML =
      `<span class="marquee">${musica}</span>`;

    document.getElementById("status").innerText = data.status;
    document.getElementById("ouvintes").innerText = data.ouvintes;

    buscarCapa(artista, musica);

  } catch (e) {
    console.log("Erro API:", e);
  }
}

// 🍎 BUSCAR CAPA NA APPLE MUSIC (iTunes API)
async function buscarCapa(artista, musica) {
  try {
    let termo = encodeURIComponent(artista + " " + musica);

    let url = `https://itunes.apple.com/search?term=${termo}&entity=song&limit=1`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.results.length > 0) {
      let capa = data.results[0].artworkUrl100.replace("100x100", "500x500");
      document.getElementById("cover").src = capa;
    }

  } catch (e) {
    console.log("Erro capa:", e);
  }
}

// 🔄 Atualização automática
setInterval(atualizarPlayer, 10000);
atualizarPlayer();
</script>

</body>
</html>
