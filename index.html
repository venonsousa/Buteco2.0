<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player da Rádio</title>
  <style>
    .player {
      width: 733px;
      height: 459px;
      border: 2px solid #333;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .cover {
      flex: 2;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cover img {
      max-width: 100%;
      max-height: 100%;
    }
    .info {
      flex: 1;
      padding: 10px;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .play-btn {
      background: #ff4444;
      border: none;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    .socials {
      display: flex;
      gap: 10px;
    }
    .socials a img {
      width: 24px;
      height: 24px;
      filter: invert(1);
    }
  </style>
</head>
<body>
  <div class="player">
    <div class="cover">
      <img id="capa" src="" alt="Capa da música">
    </div>
    <div class="info">
      <h3 id="titulo">Carregando rádio...</h3>
      <p><strong>Artista:</strong> <span id="artista">--</span></p>
      <p><strong>Música:</strong> <span id="musica">--</span></p>
      <div class="controls">
        <button id="playPause" class="play-btn">Play</button>
        <div class="socials">
          <a href="https://instagram.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg" alt="Instagram"></a>
          <a href="https://facebook.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg" alt="Facebook"></a>
          <a href="https://x.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/x.svg" alt="X"></a>
          <a href="https://t.me" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/telegram.svg" alt="Telegram"></a>
        </div>
      </div>
      <audio id="audio" autoplay>
        <source src="https://stm.igng.com.br:7018/stream" type="audio/mpeg">
        Seu navegador não suporta áudio HTML5.
      </audio>
    </div>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const playPauseBtn = document.getElementById("playPause");

    playPauseBtn.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
        playPauseBtn.textContent = "Pause";
      } else {
        audio.pause();
        playPauseBtn.textContent = "Play";
      }
    });

    async function carregarInfo() {
      try {
        const response = await fetch("http://igng.com.br/api/NzAxOCsx");
        const text = await response.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "application/xml");

        document.getElementById("titulo").textContent =
          xml.getElementsByTagName("titulo")[0].textContent;

        const musicaAtual = xml.getElementsByTagName("musica_atual")[0].textContent;
        // Separar artista e música pelo " - "
        const partes = musicaAtual.split(" - ");
        document.getElementById("artista").textContent = partes[0] || "--";
        document.getElementById("musica").textContent = partes[1] || "--";

        document.getElementById("capa").src =
          xml.getElementsByTagName("capa_musica")[0].textContent;
      } catch (e) {
        console.error("Erro ao carregar API", e);
      }
    }

    carregarInfo();
    setInterval(carregarInfo, 15000); // atualiza a cada 15s
  </script>
</body>
</html>
