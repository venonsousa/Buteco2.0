<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  font-family: Arial;
}

/* PLAYER */
.player {
  width: 720px;
  height: 360px;
  display: flex;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  color: #fff;
}

/* CAPA GIRANDO */
.capa {
  width: 230px;
  height: 230px;
  margin: 20px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  animation: girar 10s linear infinite;
  animation-play-state: paused;
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.playing .capa {
  animation-play-state: running;
}

/* TEXTO */
.content {
  padding: 20px;
}

.artista {
  font-size: 18px;
  opacity: 0.7;
}

.musica {
  font-size: 28px;
  font-weight: bold;
  margin-top: 10px;
}

.album {
  font-size: 14px;
  opacity: 0.6;
  margin-top: 5px;
}

/* BOTÃO */
.btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: #1db954;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-top: 20px;
}

.icon {
  width: 0;
  height: 0;
  border-left: 18px solid #fff;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
}

.playing .icon {
  width: 16px;
  height: 20px;
  border: none;
  position: relative;
}

.playing .icon::before,
.playing .icon::after {
  content: "";
  position: absolute;
  width: 5px;
  height: 100%;
  background: #fff;
}

.playing .icon::before { left: 0; }
.playing .icon::after { right: 0; }

</style>
</head>

<body>

<div class="player" id="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div class="artista" id="artista">Carregando...</div>
    <div class="musica" id="musica">Carregando música...</div>
    <div class="album" id="album">---</div>

    <div class="btn" onclick="togglePlay()" id="btn">
      <div class="icon"></div>
    </div>
  </div>

</div>

<audio id="audio" src="https://stm.igng.com.br:7018/stream"></audio>

<script>

let audio = document.getElementById("audio");
let player = document.getElementById("player");

/* PLAY */
function togglePlay() {
  audio.paused ? audio.play() : audio.pause();
}

audio.onplay = () => player.classList.add("playing");
audio.onpause = () => player.classList.remove("playing");

/* APIs */
const API_JSON = "https://api.codetabs.com/v1/proxy?quest=https://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=";
const API_XML = "https://api.codetabs.com/v1/proxy?quest=http://igng.com.br/api/TnpBeE9BPT0rWg==";
const API_FALLBACK = "https://api.codetabs.com/v1/proxy?quest=http://igng.com.br/api-json/TnpBeE9BPT0rWg==";

/* ATUALIZA PLAYER */
function atualizar(artista, musica, album) {
  document.getElementById("artista").innerText = artista || "AO VIVO";
  document.getElementById("musica").innerText = musica || "Transmissão ao vivo";
  document.getElementById("album").innerText = album ? "💿 " + album : "";
}

/* CAPA */
function carregarCapa() {
  fetch(API_JSON)
    .then(r => r.json())
    .then(data => {
      if (data.capa_musica) {
        document.getElementById("capa").style.backgroundImage =
          `url(${data.capa_musica})`;
      }
    })
    .catch(()=>{});
}

/* INFO COM FALLBACK */
function carregarInfo() {

  fetch(API_XML)
    .then(r => r.text())
    .then(str => {

      let xml = new DOMParser().parseFromString(str, "text/xml");

      let artista = xml.querySelector("artista")?.textContent;
      let musica  = xml.querySelector("musica")?.textContent;
      let album   = xml.querySelector("album")?.textContent;

      if (musica) {
        atualizar(artista, musica, album);
      } else {
        throw "erro";
      }

    })
    .catch(() => {

      fetch(API_FALLBACK)
        .then(r => r.json())
        .then(data => {

          let texto = data.musica_atual || "";

          let partes = texto.split(" - ");

          let artista = partes[0] || "AO VIVO";
          let musica  = partes[1] || texto;

          atualizar(artista, musica, data.album);
        });

    });
}

/* LOOP */
setInterval(() => {
  carregarCapa();
  carregarInfo();
}, 3000);

carregarCapa();
carregarInfo();

</script>

</body>
</html>
