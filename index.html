<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player da Rádio</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    .player {
      width: 733px;
      height: 459px;
      border: 2px solid #333;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: url('https://xatimg.com/image/EMsDSWDlogLy.png') no-repeat center center;
      background-size: cover;
      color: #fff;
      font-family: Arial, sans-serif;
      position: relative;
    }
    .top {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      padding: 10px;
    }
    .cover {
      width: 150px;
      height: 150px;
      margin-right: 15px;
    }
    .cover img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.9); /* sombra preta forte */
    }
    .info {
      flex: 1;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 8px;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 15px;
    }
    .play-btn {
      background: #666; /* cinza */
      border: none;
      color: #fff;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 0 15px rgba(0,0,0,0.8); /* sombra preta */
    }
    .play-btn:hover {
      background: #999;
      transform: scale(1.1);
    }
    .volume {
      margin-left: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.7); /* sombra preta no slider */
    }
    .socials {
      display: flex;
      gap: 10px;
    }
    .socials a img {
      width: 24px;
      height: 24px;
      filter: invert(1);
      transition: transform 0.3s ease, filter 0.3s ease;
      box-shadow: 0 0 10px rgba(0,0,0,0.7); /* sombra preta nos ícones */
      border-radius: 50%;
      padding: 3px;
      background: rgba(0,0,0,0.4);
    }
    .socials a img:hover {
      transform: rotate(15deg) scale(1.2);
      filter: invert(0.5) sepia(1) hue-rotate(200deg);
    }
  </style>
</head>
<body>
  <div class="player" id="player">
    <div class="top">
      <div class="cover">
        <img id="capa" src="" alt="Capa da música">
      </div>
      <div class="info">
        <h3 id="titulo">Carregando rádio...</h3>
        <p><strong>Artista:</strong> <span id="artista">--</span></p>
        <p><strong>Música:</strong> <span id="musica">--</span></p>
        <p><strong>Ouvintes:</strong> <span id="ouvintes">--</span></p>
        <p><strong>Bitrate:</strong> <span id="bitrate">--</span> kbps</p>
      </div>
    </div>
    <div class="controls">
      <button id="playPause" class="play-btn">▶</button>
      <input id="volume" class="volume" type="range" min="0" max="1" step="0.01" value="1">
      <div class="socials">
        <a href="https://instagram.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg" alt="Instagram"></a>
        <a href="https://facebook.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg" alt="Facebook"></a>
        <a href="https://x.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/x.svg" alt="X"></a>
        <a href="https://t.me" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/telegram.svg" alt="Telegram"></a>
      </div>
    </div>
    <audio id="audio" autoplay>
      <source src="https://stm.igng.com.br:7018/stream" type="audio/mpeg">
      Seu navegador não suporta áudio HTML5.
    </audio>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const playPauseBtn = document.getElementById("playPause");
    const volumeSlider = document.getElementById("volume");

    playPauseBtn.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
        playPauseBtn.textContent = "❚❚";
      } else {
        audio.pause();
        playPauseBtn.textContent = "▶";
      }
    });

    volumeSlider.addEventListener("input", () => {
      audio.volume = volumeSlider.value;
    });

    function atualizarInfo() {
      $.ajax({
        url: 'https://igng.com.br/api/NzAxOCsx',
        dataType: 'xml',
        success: function(xml) {
          const titulo = $(xml).find('titulo').text();
          const musicaAtual = $(xml).find('musica_atual').text();
          const capa = $(xml).find('capa_musica').text();
          const ouvintes = $(xml).find('ouvintes_conectados').text();
          const bitrate = $(xml).find('plano_bitrate').text();

          $("#titulo").text(titulo);

          const partes = musicaAtual.split(" - ");
          $("#artista").text(partes[0] || "--");
          $("#musica").text(partes[1] || "--");

          $("#capa").attr("src", capa);
          $("#ouvintes").text(ouvintes);
          $("#bitrate").text(bitrate);
        }
      });
    }

    atualizarInfo();
    setInterval(atualizarInfo, 5000);

    // Bloquear inspeção e ver código-fonte
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
      alert("Função desativada!");
    });
    document.addEventListener("keydown", function(e) {
      if (e.key === "F12" || 
          (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") || 
          (e.ctrlKey && e.key.toLowerCase() === "u")) {
        e.preventDefault();
        alert("Função desativada!");
      }
    });
  </script>
</body>
</html>
