<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Rádio ULTRA MASTER</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  font-family: Arial;
}

/* PLAYER */
.player {
  width: 720px;
  height: 360px;
  display: flex;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  color: #fff;
  position: relative;
}

/* FUNDO DINÂMICO */
.player::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: var(--bg-player, url('https://picsum.photos/800/500')) center/cover;
  filter: blur(20px) brightness(0.3);
  transform: scale(1.2);
  z-index: 0;
}

.player > * {
  position: relative;
  z-index: 2;
}

/* CAPA GIRANDO */
.capa {
  width: 230px;
  height: 230px;
  margin: 20px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  animation: girar 8s linear infinite;
  animation-play-state: paused;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.playing .capa {
  animation-play-state: running;
}

/* CONTEÚDO */
.content {
  padding: 20px;
  flex: 1;
}

.artista {
  font-size: 18px;
  opacity: 0.7;
}

.musica {
  font-size: 28px;
  font-weight: bold;
  margin-top: 10px;
}

.album {
  font-size: 14px;
  opacity: 0.6;
  margin-top: 5px;
}

/* PLAY */
.btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: #1db954;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-top: 20px;
}

.icon {
  width: 0;
  height: 0;
  border-left: 18px solid #fff;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
}

.playing .icon {
  width: 16px;
  height: 20px;
  border: none;
  position: relative;
}

.playing .icon::before,
.playing .icon::after {
  content: "";
  position: absolute;
  width: 5px;
  height: 100%;
  background: #fff;
}

.playing .icon::before { left: 0; }
.playing .icon::after { right: 0; }

/* REDES (MENOR) */
.redes {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}

.btn-social {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 13px;
}

/* PARTÍCULAS */
.particle {
  position: fixed;
  width: 5px;
  height: 5px;
  background: #fff;
  border-radius: 50%;
  animation: subir 1s forwards;
}

@keyframes subir {
  to { transform: translateY(-50px); opacity: 0; }
}
</style>
</head>

<body>

<div class="player" id="player">

  <div class="capa" id="capa"></div>

  <div class="content">
    <div class="artista" id="artista">Carregando...</div>
    <div class="musica" id="musica">---</div>
    <div class="album" id="album">---</div>

    <div class="btn" onclick="togglePlay()" id="btn">
      <div class="icon"></div>
    </div>

    <div class="redes">
      <div class="btn-social" onclick="abrir('https://facebook.com')">f</div>
      <div class="btn-social" onclick="abrir('https://x.com')">X</div>
      <div class="btn-social" onclick="abrir('https://t.me')">T</div>
      <div class="btn-social" onclick="abrir('https://instagram.com')">I</div>
    </div>

  </div>

</div>

<audio id="audio" src="https://stm.igng.com.br:7018/stream"></audio>

<script>

let audio = document.getElementById("audio");
let player = document.getElementById("player");
let ultimaMusica = "";

/* PLAY */
function togglePlay() {
  audio.paused ? audio.play() : audio.pause();
}

audio.onplay = () => player.classList.add("playing");
audio.onpause = () => player.classList.remove("playing");

/* ABRIR LINKS */
function abrir(url){
  window.open(url, "_blank");
}

/* APIs */
const API_JSON = "https://api.codetabs.com/v1/proxy?quest=https://igng.com.br/api-json/VG5wQmVFOUJQVDA9KzM=";
const API_XML = "https://api.codetabs.com/v1/proxy?quest=http://igng.com.br/api/TnpBeE9BPT0rWg==";
const API_JSON_FALLBACK = "https://api.codetabs.com/v1/proxy?quest=http://igng.com.br/api-json/TnpBeE9BPT0rWg==";

/* ATUALIZAR PLAYER */
function atualizarPlayer(artista, musica, album) {

  if (musica === ultimaMusica) return;
  ultimaMusica = musica;

  document.getElementById("artista").innerText = artista || "---";
  document.getElementById("musica").innerText = musica || "---";
  document.getElementById("album").innerText = "💿 " + (album || "---");
}

/* CAPA */
function carregarCapa() {
  fetch(API_JSON)
    .then(r => r.json())
    .then(data => {
      if (data.capa_musica) {
        document.getElementById("capa").style.backgroundImage = `url(${data.capa_musica})`;
        document.getElementById("player").style.setProperty("--bg-player", `url(${data.capa_musica})`);
      }
    });
}

/* INFO COM FALLBACK */
function carregarInfo() {

  fetch(API_XML)
    .then(r => r.text())
    .then(str => {

      let xml = new DOMParser().parseFromString(str, "text/xml");

      let artista = xml.getElementsByTagName("artista")[0]?.textContent;
      let musica  = xml.getElementsByTagName("musica")[0]?.textContent;
      let album   = xml.getElementsByTagName("album")[0]?.textContent;

      if (musica && musica !== "") {
        atualizarPlayer(artista, musica, album);
      } else {
        throw "XML vazio";
      }

    })
    .catch(() => {

      fetch(API_JSON_FALLBACK)
        .then(r => r.json())
        .then(data => {

          let texto = data.musica_atual || "";
          let partes = texto.split(" - ");

          let artista = partes[0] || "AO VIVO";
          let musica  = partes[1] || texto;
          let album   = data.album || "---";

          atualizarPlayer(artista, musica, album);
        });

    });
}

/* LOOP */
setInterval(() => {
  carregarCapa();
  carregarInfo();
}, 3000);

carregarCapa();
carregarInfo();

/* PARTÍCULAS */
document.addEventListener("mousemove", e => {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = e.clientX + "px";
  p.style.top = e.clientY + "px";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1000);
});

</script>

</body>
</html>
