<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player da Rádio</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    .player {
      width: 733px;
      height: 459px;
      border: 2px solid #333;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: url('https://xatimg.com/image/EMsDSWDlogLy.png') no-repeat center center;
      background-size: cover;
      color: #fff;
      font-family: Arial, sans-serif;
      position: relative;
    }
    .cover {
      flex: 2;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .cover img {
      max-width: 100%;
      max-height: 100%;
      transition: transform 0.3s ease;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
    }
    .cover img:hover {
      transform: scale(1.05);
    }
    .info {
      flex: 1;
      padding: 10px;
      background: rgba(0,0,0,0.6);
      border-top: 1px solid #444;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .play-btn {
      background: #ff4444;
      border: none;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s, transform 0.2s;
    }
    .play-btn:hover {
      background: #ff7777;
      transform: scale(1.1);
    }
    .socials {
      display: flex;
      gap: 10px;
    }
    .socials a img {
      width: 24px;
      height: 24px;
      filter: invert(1);
      transition: transform 0.3s ease, filter 0.3s ease;
    }
    .socials a img:hover {
      transform: scale(1.2);
      filter: invert(0.5) sepia(1) hue-rotate(200deg);
    }
    /* Notas musicais animadas */
    .note {
      position: absolute;
      font-size: 22px;
      color: #ffcc00;
      animation: floatUp 1.8s ease-out forwards;
      pointer-events: none;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.4); }
    }
  </style>
</head>
<body>
  <div class="player" id="player">
    <div class="cover">
      <img id="capa" src="" alt="Capa da música">
    </div>
    <div class="info">
      <h3 id="titulo">Carregando rádio...</h3>
      <p><strong>Artista:</strong> <span id="artista">--</span></p>
      <p><strong>Música:</strong> <span id="musica">--</span></p>
      <p><strong>Ouvintes:</strong> <span id="ouvintes">--</span></p>
      <p><strong>Bitrate:</strong> <span id="bitrate">--</span> kbps</p>
      <div class="controls">
        <button id="playPause" class="play-btn">Play</button>
        <div class="socials">
          <a href="https://instagram.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg" alt="Instagram"></a>
          <a href="https://facebook.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg" alt="Facebook"></a>
          <a href="https://x.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/x.svg" alt="X"></a>
          <a href="https://t.me" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/telegram.svg" alt="Telegram"></a>
        </div>
      </div>
      <audio id="audio" autoplay>
        <source src="https://stm.igng.com.br:7018/stream" type="audio/mpeg">
        Seu navegador não suporta áudio HTML5.
      </audio>
    </div>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const playPauseBtn = document.getElementById("playPause");
    const player = document.getElementById("player");

    playPauseBtn.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
        playPauseBtn.textContent = "Pause";
      } else {
        audio.pause();
        playPauseBtn.textContent = "Play";
      }
    });

    function atualizarInfo() {
      $.ajax({
        url: 'http://igng.com.br/api/NzAxOCsx',
        dataType: 'xml',
        success: function(xml) {
          const titulo = $(xml).find('titulo').text();
          const musicaAtual = $(xml).find('musica_atual').text();
          const capa = $(xml).find('capa_musica').text();
          const ouvintes = $(xml).find('ouvintes_conectados').text();
          const bitrate = $(xml).find('plano_bitrate').text();

          $("#titulo").text(titulo);

          const partes = musicaAtual.split(" - ");
          $("#artista").text(partes[0] || "--");
          $("#musica").text(partes[1] || "--");

          $("#capa").attr("src", capa);
          $("#ouvintes").text(ouvintes);
          $("#bitrate").text(bitrate);
        }
      });
    }

    atualizarInfo();
    setInterval(atualizarInfo, 15000);

    // Notas musicais no cursor
    player.addEventListener("mousemove", function(e) {
      const note = document.createElement("div");
      note.className = "note";
      note.style.left = e.offsetX + "px";
      note.style.top = e.offsetY + "px";
      const notas = ["♪", "♫", "♬"];
      note.textContent = notas[Math.floor(Math.random() * notas.length)];
      player.appendChild(note);
      setTimeout(() => note.remove(), 1800);
    });
  </script>
</body>
</html>
