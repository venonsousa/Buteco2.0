<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Rádio PRO</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
  font-family: Arial, sans-serif;
}

.player {
  width: 320px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  color: #fff;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.capa {
  width: 200px;
  height: 200px;
  margin: 0 auto 15px;
  border-radius: 50%;
  overflow: hidden;
  animation: girar 10s linear infinite;
}

.capa img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.info {
  margin-top: 10px;
}

#artista {
  font-size: 14px;
  opacity: 0.7;
}

#musica {
  font-size: 16px;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
}

.marquee {
  display: inline-block;
  padding-left: 100%;
  animation: marquee 10s linear infinite;
}

@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

.controls {
  margin-top: 15px;
}

button {
  background: #00ffcc;
  border: none;
  padding: 10px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
}

.stats {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="player">

  <div class="capa">
    <img id="cover" src="https://via.placeholder.com/300">
  </div>

  <div class="info">
    <div id="artista">Artista</div>
    <div id="musica"><span class="marquee">Nome da música</span></div>
  </div>

  <div class="controls">
    <button onclick="togglePlay()">▶️ Play</button>
  </div>

  <div class="stats">
    <div>Status: <span id="status">--</span></div>
    <div>Ouvintes: <span id="ouvintes">0</span></div>
  </div>

</div>

<audio id="audio" src="https://stm.igng.com.br:7018" preload="none"></audio>

<script>
let audio = document.getElementById("audio");
let tocando = false;

function togglePlay() {
  if (tocando) {
    audio.pause();
    tocando = false;
  } else {
    audio.play();
    tocando = true;
  }
}

// 🔥 API da rádio
async function atualizarPlayer() {
  try {
    const res = await fetch("https://api.allorigins.win/raw?url=http://igng.com.br/api-json/TnpBeE9BPT0rWg==");
    const data = await res.json();

    let musicaCompleta = data.musica || "Desconhecido";

    let partes = musicaCompleta.split(" - ");
    let artista = partes[0] || "";
    let musica = partes[1] || musicaCompleta;

    document.getElementById("artista").innerText = artista;
    document.getElementById("musica").innerHTML = '<span class="marquee">' + musica + '</span>';
    document.getElementById("status").innerText = data.status;
    document.getElementById("ouvintes").innerText = data.ouvintes;

    buscarCapa(artista, musica);

  } catch (e) {
    console.log("Erro API:", e);
  }
}

// 🍎 Buscar capa (Apple Music / iTunes)
async function buscarCapa(artista, musica) {
  try {
    let termo = encodeURIComponent(artista + " " + musica);
    let url = https://itunes.apple.com/search?term=${termo}&entity=song&limit=1;

    const res = await fetch(url);
    const data = await res.json();

    if (data.results.length > 0) {
      document.getElementById("cover").src = data.results[0].artworkUrl100.replace("100x100", "300x300");
    }

  } catch (e) {
    console.log("Erro capa:", e);
  }
}

// atualizar automático
setInterval(atualizarPlayer, 10000);
atualizarPlayer();
</script>

</body>
</html>
