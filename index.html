<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player da Rádio</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    .player {
      width: 733px;
      height: 459px;
      border: 2px solid #333;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: url('https://xatimg.com/image/EMsDSWDlogLy.png') no-repeat center center;
      background-size: cover;
      color: #fff;
      font-family: Arial, sans-serif;
      position: relative;
      box-sizing: border-box;
    }
    .top { padding: 10px; }
    .info {
      background: rgba(0,0,0,0.6);
      padding: 8px;
      border-radius: 8px;
      line-height: 1.4;
      font-size: 14px;
    }
    .info h3 { margin: 5px 0; font-size: 16px; }
    .info p { margin: 3px 0; }
    .controls { display: flex; align-items: center; justify-content: center; margin-top: 15px; gap: 25px; }
    .play-btn { background: #fff; border: none; color: #000; width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
      font-size: 16px; font-weight: bold; transition: transform 0.2s; box-shadow: 0 0 15px #fff, 0 0 30px #fff; }
    .play-btn:hover { transform: scale(1.1); }
    .volume { accent-color: #fff; box-shadow: 0 0 10px #fff, 0 0 20px #fff; width: 150px; }
    .socials { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    .socials a img { width: 22px; height: 22px; filter: invert(1); transition: transform 0.3s ease, filter 0.3s ease;
      box-shadow: 0 0 10px rgba(0,0,0,0.8); border-radius: 50%; padding: 3px; background: rgba(0,0,0,0.4); }
    .socials a img:hover { transform: rotate(15deg) scale(1.2); filter: invert(0.5) sepia(1) hue-rotate(200deg); }
    .gallery-btn { display: flex; justify-content: center; margin-top: 10px; }
    .gallery-btn img { width: 60px; height: 60px; cursor: pointer; border-radius: 8px; box-shadow: 0 0 15px #fff, 0 0 30px #fff; transition: transform 0.3s; }
    .gallery-btn img:hover { transform: scale(1.1); }
    .datetime { text-align: center; margin-top: 10px; font-size: 14px; font-weight: bold; text-shadow: 0 0 10px #fff; }

    /* capa fixa no canto inferior esquerdo */
    .cover {
      width: 182px;
      height: 155px;
      position: absolute;
      bottom: 10px;
      left: 10px;
    }
    .cover img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,1);
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="player" id="player">
    <div class="top">
      <div class="info">
        <h3 id="titulo">Web Rádio</h3>
        <p><strong>Artista:</strong> <span id="artista">--</span></p>
        <p><strong>Música:</strong> <span id="musica">--</span></p>
        <p><strong>Ouvintes:</strong> <span id="ouvintes">1</span></p>
        <p><strong>Bitrate:</strong> <span id="bitrate">128Kbps</span></p>
      </div>
    </div>

    <!-- capa fixa no canto -->
    <div class="cover">
      <img id="capa" src="" alt="Capa da música">
    </div>

    <div class="controls">
      <button id="playPause" class="play-btn">▶</button>
      <input id="volume" class="volume" type="range" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="socials">
      <a href="https://instagram.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg" alt="Instagram"></a>
      <a href="https://facebook.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg" alt="Facebook"></a>
      <a href="https://x.com" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/x.svg" alt="X"></a>
      <a href="https://t.me" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/telegram.svg" alt="Telegram"></a>
    </div>
    <div class="gallery-btn">
      <a href="#" target="_blank"><img src="https://xatimg.com/image/1YAIzAbC2yzt.gif" alt="Galeria"></a>
    </div>
    <div class="datetime" id="datetime"></div>
    <audio id="audio" autoplay>
      <source src="https://stm.igng.com.br:7018/stream" type="audio/mpeg">
      Seu navegador não suporta áudio HTML5.
    </audio>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const playPauseBtn = document.getElementById("playPause");
    const volumeSlider = document.getElementById("volume");

    playPauseBtn.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
        playPauseBtn.textContent = "❚❚";
      } else {
        audio.pause();
        playPauseBtn.textContent = "▶";
      }
    });

    volumeSlider.addEventListener("input", () => {
      audio.volume = volumeSlider.value;
    });

    // Função para buscar foto do artista na Apple Music
    function buscarFotoAppleMusic(artista) {
      $.ajax({
        url: `https://itunes.apple.com/search?term=${encodeURIComponent(artista)}&entity=musicArtist`,
        dataType: 'jsonp', // Apple exige JSONP
        success: function(data) {
          if (data.results && data.results.length > 0) {
            const imagem = data.results[0].artworkUrl100.replace("100x100", "300x300");
            $("#capa").attr("src", imagem);
          }
        }
      });
    }

    function atualizarInfo() {
      $.ajax({
        url: 'https://igng.com.br/api/NzAxOCsx',
        dataType: 'xml',
        success: function(xml) {
          const musicaAtual = $(xml).find('musica_atual').text();
          const ouvintes = $(xml).find('ouvintes_conectados').text();

          const partes = musicaAtual.split(" - ");
          const artista = partes[0] || "--";
          const musica = partes[1] || "--";

          $("#artista").text(artista);
          $("#musica").text(musica);
          $("#ouvintes").text(ouvintes);
          $("#bitrate").text("128Kbps");

          // Chama Apple Music para buscar a foto do artista
          if (artista !== "--") {
            buscarFotoAppleMusic(artista);
          }
        }
      });
    }

    atualizarInfo();
    setInterval(atualizarInfo, 5000);

    // Atualizar data e hora em tempo real (Horário de Brasília)
    function atualizarDataHora() {
      const agora = new Date();
      const opcoes = { timeZone: "America/Sao_Paulo", hour12: false };
      const data = agora.toLocaleDateString("pt-BR", opcoes);
      const hora = agora.toLocaleTimeString("pt-BR", opcoes);
      document.getElementById("datetime").textContent = `Data: ${data} | Hora: ${hora} (Brasília)`;
    }
    atualizarDataHora();
